name: Deploy Supabase Migrations

on:
  workflow_dispatch:

jobs:
  migrate:
    runs-on: ubuntu-latest

    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
      SUPABASE_PROJECT_ID: orbxyyjpvpbqwfssnyeq

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link production project
        run: supabase link --project-ref $SUPABASE_PROJECT_ID

      - name: Remove duplicate migration history rows
        run: |
          supabase db query --linked \
            "DELETE FROM supabase_migrations.schema_migrations WHERE version ~ '^[0-9]{14}_';"

      - name: Show migration status
        run: supabase migration list

      - name: Push migrations to production
        run: supabase db push --include-all --yes
